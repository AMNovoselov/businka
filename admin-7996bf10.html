<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Businka Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #0a0a0a;
      --bg2:    #111;
      --bg3:    #181818;
      --accent: #c8a96e;
      --text:   #f0ece8;
      --text2:  #6b6460;
      --border: #1e1e1e;
      --red:    #e05555;
    }
    body { background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; font-size: 14px; line-height: 1.6; }

    /* ── Auth ── */
    #screen-auth {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.5rem; padding: 2rem;
    }
    #screen-auth h1 { font-size: 1.5rem; letter-spacing: 0.04em; }
    #screen-auth h1 span { color: var(--accent); }
    .auth-card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
      padding: 2rem; width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 1rem;
    }
    .auth-card p { color: var(--text2); font-size: 0.85rem; }
    .error { color: var(--red); font-size: 0.82rem; min-height: 1.2em; }

    /* ── Main ── */
    #screen-main { display: none; }
    .admin-header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(10,10,10,0.9); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem; height: 54px;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    .admin-header h1 { font-size: 1rem; letter-spacing: 0.06em; }
    .admin-header h1 span { color: var(--accent); }
    .save-area { display: flex; align-items: center; gap: 1rem; }
    .save-status { font-size: 0.8rem; color: var(--text2); }

    /* ── Top tabs ── */
    .admin-tabs {
      display: flex; border-bottom: 1px solid var(--border);
      padding: 0 2rem; gap: 0; background: var(--bg);
    }
    .admin-tab-btn {
      padding: 0.9rem 1.5rem; background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--text2); cursor: pointer; font-size: 0.88rem; font-family: inherit;
      transition: all 0.2s; margin-bottom: -1px;
    }
    .admin-tab-btn:hover { color: var(--text); }
    .admin-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Content areas ── */
    .admin-panel { display: none; padding: 2rem; max-width: 900px; margin: 0 auto; }
    .admin-panel.active { display: block; }

    /* ── Form ── */
    .form-section { margin-bottom: 2.5rem; }
    .form-section h2 {
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--accent); margin-bottom: 1.2rem; padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-grid.full { grid-template-columns: 1fr; }
    .field { display: flex; flex-direction: column; gap: 0.4rem; }
    .field label { font-size: 0.78rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
    .field input, .field textarea {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); padding: 0.6rem 0.8rem; font-family: inherit; font-size: 0.88rem;
      transition: border-color 0.2s; width: 100%;
    }
    .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
    .field textarea { resize: vertical; min-height: 80px; }
    .field textarea.code { font-family: monospace; font-size: 0.82rem; }
    .stat-row { display: grid; grid-template-columns: 80px 1fr; gap: 0.5rem; align-items: end; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.55rem 1.2rem; border-radius: 6px; border: none;
      font-family: inherit; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s;
    }
    .btn-gold { background: var(--accent); color: #0a0a0a; }
    .btn-gold:hover { filter: brightness(1.1); }
    .btn-gold:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Portfolio ── */
    .cat-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .cat-btn {
      padding: 0.4rem 1rem; border-radius: 100px; border: 1px solid var(--border);
      background: none; color: var(--text2); font-family: inherit; font-size: 0.82rem; cursor: pointer; transition: all 0.2s;
    }
    .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
    .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #0a0a0a; font-weight: 500; }

    .upload-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .upload-status { font-size: 0.82rem; color: var(--text2); }

    .photo-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px;
    }
    .photo-thumb {
      position: relative; border-radius: 6px; overflow: hidden;
      background: var(--bg3); border: 1px solid var(--border);
    }
    .photo-thumb img { width: 100%; height: 140px; object-fit: cover; display: block; }
    .thumb-del {
      position: absolute; top: 6px; right: 6px;
      width: 24px; height: 24px; border-radius: 50%; border: none;
      background: rgba(0,0,0,0.7); color: #fff; font-size: 0.75rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .thumb-del:hover { background: var(--red); }
  </style>
</head>
<body>

<!-- ── AUTH SCREEN ── -->
<div id="screen-auth">
  <h1>Bu<span>•</span>sinka Admin</h1>

  <div class="auth-card" id="card-password">
    <p>Введите пароль администратора</p>
    <div class="field">
      <label>Пароль</label>
      <input type="password" id="input-password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <div class="error" id="password-error"></div>
    <button class="btn btn-gold" id="btn-check-password">Войти →</button>
  </div>

  <div class="auth-card" id="card-token" style="display:none">
    <p>GitHub Personal Access Token (fine-grained, Contents: Read &amp; Write для репо businka)</p>
    <div class="field">
      <label>Token</label>
      <input type="password" id="input-token" placeholder="ghp_...">
    </div>
    <div class="error" id="token-error"></div>
    <button class="btn btn-gold" id="btn-save-token">Продолжить →</button>
  </div>
</div>

<!-- ── MAIN SCREEN ── -->
<div id="screen-main">
  <header class="admin-header">
    <h1>Bu<span>•</span>sinka Admin</h1>
    <div class="save-area">
      <span class="save-status" id="save-status"></span>
      <button class="btn btn-gold" id="btn-save">💾 Сохранить</button>
    </div>
  </header>

  <nav class="admin-tabs">
    <button class="admin-tab-btn active" data-panel="text">📝 Текст</button>
    <button class="admin-tab-btn" data-panel="portfolio">🖼 Портфолио</button>
    <button class="admin-tab-btn" data-panel="settings">⚙️ Настройки</button>
  </nav>

  <!-- TEXT TAB -->
  <div class="admin-panel active" id="panel-text">

    <div class="form-section">
      <h2>Основное</h2>
      <div class="form-grid full">
        <div class="field">
          <label>Tagline (hero badge)</label>
          <input type="text" id="f-tagline">
        </div>
        <div class="field">
          <label>Заголовок hero (HTML разрешён)</label>
          <textarea class="code" id="f-hero-title" rows="2"></textarea>
        </div>
        <div class="field">
          <label>Подзаголовок hero</label>
          <textarea id="f-hero-sub" rows="2"></textarea>
        </div>
      </div>
    </div>

    <div class="form-section">
      <h2>Статистика</h2>
      <div class="form-grid full">
        <div class="stat-row">
          <div class="field"><label>Значение</label><input type="text" id="f-stat-0-val"></div>
          <div class="field"><label>Подпись</label><input type="text" id="f-stat-0-lbl"></div>
        </div>
        <div class="stat-row">
          <div class="field"><label>Значение</label><input type="text" id="f-stat-1-val"></div>
          <div class="field"><label>Подпись</label><input type="text" id="f-stat-1-lbl"></div>
        </div>
        <div class="stat-row">
          <div class="field"><label>Значение</label><input type="text" id="f-stat-2-val"></div>
          <div class="field"><label>Подпись</label><input type="text" id="f-stat-2-lbl"></div>
        </div>
      </div>
    </div>

    <div class="form-section">
      <h2>О себе</h2>
      <div class="form-grid full">
        <div class="field">
          <label>Имя</label>
          <input type="text" id="f-about-name">
        </div>
        <div class="field">
          <label>Биография — абзац 1</label>
          <textarea id="f-bio-0" rows="3"></textarea>
        </div>
        <div class="field">
          <label>Биография — абзац 2</label>
          <textarea id="f-bio-1" rows="3"></textarea>
        </div>
        <div class="field">
          <label>Фото «О себе» (URL)</label>
          <input type="text" id="f-about-photo" placeholder="https://... или photos/hero/photo.jpg">
        </div>
      </div>
    </div>

    <div class="form-section">
      <h2>Контакты</h2>
      <div class="form-grid">
        <div class="field">
          <label>Telegram URL</label>
          <input type="text" id="f-tg-url" placeholder="https://t.me/username">
        </div>
        <div class="field">
          <label>Instagram URL</label>
          <input type="text" id="f-ig-url" placeholder="https://instagram.com/username">
        </div>
        <div class="field">
          <label>Телефон (ссылка)</label>
          <input type="text" id="f-phone-url" placeholder="tel:+79001234567">
        </div>
        <div class="field">
          <label>Телефон (отображение)</label>
          <input type="text" id="f-phone-display" placeholder="+7 900 123 45 67">
        </div>
      </div>
    </div>
  </div>

  <!-- SETTINGS TAB -->
  <div class="admin-panel" id="panel-settings">
    <div class="form-section">
      <h2>Смена пароля</h2>
      <div class="form-grid full" style="max-width:400px">
        <div class="field">
          <label>Текущий пароль</label>
          <input type="password" id="f-pwd-current" autocomplete="current-password" placeholder="••••••••">
        </div>
        <div class="field">
          <label>Новый пароль</label>
          <input type="password" id="f-pwd-new" autocomplete="new-password" placeholder="••••••••">
        </div>
        <div class="field">
          <label>Повторите новый пароль</label>
          <input type="password" id="f-pwd-confirm" autocomplete="new-password" placeholder="••••••••">
        </div>
        <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
          <button class="btn btn-gold" id="btn-change-pwd">Сменить пароль</button>
          <span class="save-status" id="pwd-status"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- PORTFOLIO TAB -->
  <div class="admin-panel" id="panel-portfolio">
    <div class="cat-tabs">
      <button class="cat-btn active" data-cat="people">Люди</button>
      <button class="cat-btn" data-cat="dogs">Собаки</button>
      <button class="cat-btn" data-cat="events">Мероприятия</button>
      <button class="cat-btn" data-cat="hero">Hero-карточки</button>
    </div>
    <div class="upload-row">
      <input type="file" id="file-input" accept="image/*" multiple style="display:none">
      <button class="btn btn-ghost" id="btn-add-photo">＋ Добавить фото</button>
      <span class="upload-status" id="upload-status"></span>
    </div>
    <div class="photo-grid" id="photo-grid"></div>
  </div>
</div>

<script>
  const REPO           = 'AMNovoselov/businka';
  const GH_API         = 'https://api.github.com';
  const ADMIN_FILENAME = location.pathname.split('/').pop();
  let currentPasswordHash = 'c8fc64368a4cdeaf6bd0607b7742a49a2521ee7e7266d69cf32c575022d91409';

  let token       = '';
  let contentData = null;
  let contentSha  = '';
  let currentCat  = 'people';

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function toB64(str) {
    return btoa(unescape(encodeURIComponent(str)));
  }
  function fromB64(b64) {
    return decodeURIComponent(escape(atob(b64.replace(/\s/g, ''))));
  }

  async function ghGet(path) {
    const r = await fetch(GH_API + path, {
      headers: {
        'Authorization': 'Bearer ' + token,
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28'
      }
    });
    if (!r.ok) throw new Error('GitHub ' + r.status + ': ' + await r.text());
    return r.json();
  }

  async function ghPut(path, body) {
    const r = await fetch(GH_API + path, {
      method: 'PUT',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json',
        'X-GitHub-Api-Version': '2022-11-28'
      },
      body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error('GitHub ' + r.status + ': ' + await r.text());
    return r.json();
  }

  document.getElementById('btn-check-password').addEventListener('click', async () => {
    const pwd = document.getElementById('input-password').value;
    const hash = await sha256(pwd);
    if (hash !== currentPasswordHash) {
      document.getElementById('password-error').textContent = 'Неверный пароль';
      return;
    }
    document.getElementById('password-error').textContent = '';
    const saved = localStorage.getItem('gh_token');
    if (saved) {
      token = saved;
      await loadContent();
    } else {
      document.getElementById('card-password').style.display = 'none';
      document.getElementById('card-token').style.display = '';
    }
  });

  document.getElementById('input-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-check-password').click();
  });

  document.getElementById('btn-save-token').addEventListener('click', async () => {
    const t = document.getElementById('input-token').value.trim();
    if (!t) { document.getElementById('token-error').textContent = 'Введите токен'; return; }
    token = t;
    localStorage.setItem('gh_token', t);
    await loadContent();
  });

  async function loadContent() {
    try {
      const data = await ghGet('/repos/' + REPO + '/contents/content.json');
      contentSha  = data.sha;
      contentData = JSON.parse(fromB64(data.content));
      renderTextForm();
      renderPhotoGrid('people');
      document.getElementById('screen-auth').style.display = 'none';
      document.getElementById('screen-main').style.display = 'block';
    } catch (e) {
      document.getElementById('token-error').textContent = 'Ошибка: ' + e.message;
    }
  }

  function setVal(id, val) { const el = document.getElementById(id); if (el) el.value = val || ''; }

  function renderTextForm() {
    const d = contentData;
    setVal('f-tagline',    d.tagline);
    setVal('f-hero-title', d.hero_title_html);
    setVal('f-hero-sub',   d.hero_subtitle);
    setVal('f-about-name', d.about_name);
    setVal('f-about-photo', d.about_photo);
    d.stats.forEach((s, i) => { setVal('f-stat-' + i + '-val', s.value); setVal('f-stat-' + i + '-lbl', s.label); });
    d.about_bio.forEach((t, i) => setVal('f-bio-' + i, t));
    setVal('f-tg-url',        d.contacts.telegram_url);
    setVal('f-ig-url',        d.contacts.instagram_url);
    setVal('f-phone-url',     d.contacts.phone_url);
    setVal('f-phone-display', d.contacts.phone_display);
  }

  function collectFormData() {
    const d = JSON.parse(JSON.stringify(contentData));
    d.tagline         = document.getElementById('f-tagline').value;
    d.hero_title_html = document.getElementById('f-hero-title').value;
    d.hero_subtitle   = document.getElementById('f-hero-sub').value;
    d.about_name      = document.getElementById('f-about-name').value;
    d.about_photo     = document.getElementById('f-about-photo').value;
    d.stats = d.stats.map((_, i) => ({
      value: document.getElementById('f-stat-' + i + '-val').value,
      label: document.getElementById('f-stat-' + i + '-lbl').value,
    }));
    d.about_bio = [
      document.getElementById('f-bio-0').value,
      document.getElementById('f-bio-1').value,
    ];
    d.contacts = {
      telegram_url:  document.getElementById('f-tg-url').value,
      instagram_url: document.getElementById('f-ig-url').value,
      phone_url:     document.getElementById('f-phone-url').value,
      phone_display: document.getElementById('f-phone-display').value,
    };
    return d;
  }

  document.getElementById('btn-save').addEventListener('click', async () => {
    const btn    = document.getElementById('btn-save');
    const status = document.getElementById('save-status');
    btn.disabled = true;
    status.textContent = 'Сохраняю...';
    try {
      const updated = collectFormData();
      await ghPut('/repos/' + REPO + '/contents/content.json', {
        message: 'content: update via admin panel',
        content: toB64(JSON.stringify(updated, null, 2)),
        sha:     contentSha,
      });
      contentData = updated;
      const fresh = await ghGet('/repos/' + REPO + '/contents/content.json');
      contentSha  = fresh.sha;
      status.textContent = '✓ Сохранено — сайт обновится через ~60 сек.';
      setTimeout(() => { status.textContent = ''; }, 6000);
    } catch (e) {
      status.textContent = '✗ Ошибка: ' + e.message;
    } finally {
      btn.disabled = false;
    }
  });

  document.querySelectorAll('.admin-tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.admin-tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.panel).classList.add('active');
    });
  });

  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderPhotoGrid(btn.dataset.cat);
    });
  });

  function getPhotos(cat) {
    return cat === 'hero' ? contentData.hero_photos : contentData.portfolio[cat];
  }

  function renderPhotoGrid(cat) {
    currentCat = cat;
    const grid   = document.getElementById('photo-grid');
    const photos = getPhotos(cat);
    grid.innerHTML = '';
    photos.forEach((url, i) => {
      const div = document.createElement('div');
      div.className = 'photo-thumb';
      div.innerHTML = `
        <img src="${url}" alt="" loading="lazy">
        <button class="thumb-del" title="Удалить из списка">✕</button>`;
      div.querySelector('.thumb-del').addEventListener('click', () => deletePhoto(cat, i));
      grid.appendChild(div);
    });
  }

  function deletePhoto(cat, idx) {
    if (!confirm('Удалить фото из списка? Файл в репо останется.')) return;
    if (cat === 'hero') {
      contentData.hero_photos.splice(idx, 1);
    } else {
      contentData.portfolio[cat].splice(idx, 1);
    }
    renderPhotoGrid(cat);
  }

  document.getElementById('btn-add-photo').addEventListener('click', () => {
    document.getElementById('file-input').click();
  });

  document.getElementById('file-input').addEventListener('change', async (e) => {
    const files = Array.from(e.target.files);
    e.target.value = '';
    for (const file of files) {
      await uploadPhoto(file, currentCat);
    }
  });

  function compressImage(file, maxWidth = 1200) {
    return new Promise(resolve => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        const ratio   = Math.min(1, maxWidth / img.width);
        const canvas  = document.createElement('canvas');
        canvas.width  = Math.round(img.width  * ratio);
        canvas.height = Math.round(img.height * ratio);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        URL.revokeObjectURL(url);
        canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.85);
      };
      img.src = url;
    });
  }

  function blobToBase64(blob) {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload  = () => resolve(reader.result.split(',')[1]);
      reader.readAsDataURL(blob);
    });
  }

  document.getElementById('btn-change-pwd').addEventListener('click', async () => {
    const btn    = document.getElementById('btn-change-pwd');
    const status = document.getElementById('pwd-status');
    const curr   = document.getElementById('f-pwd-current').value;
    const next   = document.getElementById('f-pwd-new').value;
    const conf   = document.getElementById('f-pwd-confirm').value;

    if (!curr || !next || !conf) { status.textContent = '✗ Заполните все поля'; return; }
    if (next !== conf)            { status.textContent = '✗ Новые пароли не совпадают'; return; }
    if (next.length < 8)          { status.textContent = '✗ Пароль должен быть не менее 8 символов'; return; }

    const currHash = await sha256(curr);
    if (currHash !== currentPasswordHash) { status.textContent = '✗ Неверный текущий пароль'; return; }

    const newHash = await sha256(next);
    btn.disabled = true;
    status.textContent = 'Обновляю...';
    try {
      const adminFile = await ghGet('/repos/' + REPO + '/contents/' + ADMIN_FILENAME);
      const html      = fromB64(adminFile.content).replace(currentPasswordHash, newHash);
      await ghPut('/repos/' + REPO + '/contents/' + ADMIN_FILENAME, {
        message: 'admin: change password hash',
        content: toB64(html),
        sha:     adminFile.sha,
      });
      currentPasswordHash = newHash;
      document.getElementById('f-pwd-current').value = '';
      document.getElementById('f-pwd-new').value     = '';
      document.getElementById('f-pwd-confirm').value = '';
      status.textContent = '✓ Пароль успешно изменён';
      setTimeout(() => { status.textContent = ''; }, 6000);
    } catch (e) {
      status.textContent = '✗ Ошибка: ' + e.message;
    } finally {
      btn.disabled = false;
    }
  });

  async function uploadPhoto(file, cat) {
    const status = document.getElementById('upload-status');
    status.textContent = 'Сжимаю ' + file.name + '...';
    try {
      const compressed = await compressImage(file);
      const base64     = await blobToBase64(compressed);
      const safeName   = file.name.replace(/[^a-z0-9.]/gi, '_').toLowerCase().replace(/_+/g, '_');
      const filename   = Date.now() + '-' + safeName.replace(/\.[^.]+$/, '') + '.jpg';
      const folder     = cat === 'hero' ? 'photos/hero' : 'photos/' + cat;
      const path       = folder + '/' + filename;

      status.textContent = 'Загружаю ' + filename + '...';
      await ghPut('/repos/' + REPO + '/contents/' + path, {
        message: 'photo: upload ' + filename,
        content: base64,
      });

      const photoUrl = 'photos/' + (cat === 'hero' ? 'hero' : cat) + '/' + filename;
      if (cat === 'hero') {
        contentData.hero_photos.push(photoUrl);
      } else {
        contentData.portfolio[cat].push(photoUrl);
      }
      renderPhotoGrid(cat);
      status.textContent = '✓ ' + filename + ' загружен. Нажмите «Сохранить» чтобы добавить на сайт.';
      setTimeout(() => { status.textContent = ''; }, 5000);
    } catch (e) {
      status.textContent = '✗ Ошибка: ' + e.message;
    }
  }
</script>
</body>
</html>
